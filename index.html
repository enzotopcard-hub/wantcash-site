<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WantCash - Simulador</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #181818;
  color: #fff;
  margin: 0;
  padding: 40px;
  text-align: center;
}

h1 {
  color: #F5C518;
  margin-bottom: 10px;
}

p {
  color: #ccc;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border-radius: 6px;
  border: none;
  background: #222;
  color: #fff;
}

.box {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

button {
  background: #F5C518;
  border: none;
  padding: 14px 25px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 20px;
}

button:hover {
  background: #ffd84d;
}

.result {
  margin-top: 20px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">

<h1>WantCash</h1>
<p>Veja o potencial de ganhos na sua cidade</p>

<input type="number" id="populacao" placeholder="Digite a população da cidade">

<button onclick="calcular()">Calcular ganhos</button>

<div class="box result" id="resultado">
Preencha a população para ver os resultados
</div>

<a href="https://wa.me/5528999448412" target="_blank">
  <button>Falar no WhatsApp</button>
</a>

</div>

<script>
function calcular() {

  let populacao = parseFloat(document.getElementById("populacao").value);

  if (!populacao || populacao <= 0) {
    alert("Digite uma população válida");
    return;
  }

  // Mercado mais agressivo
  let mercado = populacao * 0.025;

  // Cenários
  let c1 = mercado * 0.10;
  let c2 = mercado * 0.20;
  let c3 = mercado * 0.35;

  function receita(clientes) {
    if (clientes <= 100) {
      return clientes * 113.47;
    } else {
      return (100 * 113.47) + ((clientes - 100) * 162.10);
    }
  }

  document.getElementById("resultado").innerHTML = `
    <strong>Estimativa de mercado:</strong> ${Math.round(mercado)} lojistas<br><br>

    <strong>Cenário Conservador (10%):</strong><br>
    ${Math.round(c1)} clientes<br>
    R$ ${receita(c1).toFixed(2)} / mês<br><br>

    <strong>Cenário Médio (20%):</strong><br>
    ${Math.round(c2)} clientes<br>
    R$ ${receita(c2).toFixed(2)} / mês<br><br>

    <strong>Cenário Agressivo (35%):</strong><br>
    ${Math.round(c3)} clientes<br>
    R$ ${receita(c3).toFixed(2)} / mês
  `;
}
</script>

</body>
</html>
